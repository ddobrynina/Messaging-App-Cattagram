services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules

  client:
    build:
      context: ./client/cattagram
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client/cattagram:/app
      - client_node_modules:/app/node_modules

  mongo:
    image: mongo:7.0.31-jammy
    ports:
      - "27017:27017"
    volumes:
      - ./api/mongo_data:/data/db
      # Seed scripts (mongosh) read JSON from here; host runs: mongosh < scripts/populate_dummy_data.js from api/
      - ./api:/seed:ro
      - ./api/scripts/startup:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  client_node_modules:
  api_node_modules: